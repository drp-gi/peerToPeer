<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tandem - 2026 Schedule</title>
  <link rel="stylesheet" href="styles-dashboard.css" />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    .calendar-layout { display: grid; grid-template-columns: 1fr 320px; gap: 20px; margin-top: 20px; }
    .calendar-card { background: rgba(255, 255, 255, 0.05); border-radius: 20px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.1); }
    
    /* Header & Nav */
    .cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .month-title { font-family: 'Baloo 2', sans-serif; font-size: 28px; color: #a0c4d8; }
    .nav-btn { background: #333; border: none; color: rgb(231, 184, 184); padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
    .nav-btn:hover { background: #444; color: #a0c4d8; }

    /* The Grid */
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
    .weekday { text-align: center; color: #666; font-weight: bold; font-size: 13px; padding-bottom: 10px; }
    .day-cell { aspect-ratio: 1/1; background: rgba(255, 255, 255, 0.02); border-radius: 12px; padding: 8px; border: 1px solid transparent; transition: 0.2s; position: relative; }
    .day-cell:hover { background: rgba(255, 255, 255, 0.07); border-color: #a0c4d8; }
    .day-today { border-color: #a0c4d8; background: rgba(160, 196, 216, 0.1); }
    .day-num { color: #85beff; font-size: 14px; }

    /* Markers */
    .marker { margin-top: 4px; font-size: 10px; padding: 2px 6px; border-radius: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
    .marker.invitation { background: rgba(255, 215, 0, 0.2); border: 1px dashed #ffd700; color: #ffd700; }
    .marker.session { background: #a0c4d8; color: #1a1a1a; font-weight: bold; }

    /* Sidebar Details */
    .details-panel { background: rgba(255, 255, 255, 0.05); border-radius: 20px; padding: 20px; border: 1px solid rgba(255, 255, 255, 0.1); align-self: start; }
    .invite-card { background: rgba(255, 255, 255, 0.03); border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 4px solid #ffd700; }
    .invite-actions { display: flex; gap: 8px; margin-top: 10px; }
    .btn-acc { background: #4CAF50; border: none; color: white; padding: 6px; border-radius: 4px; flex: 1; cursor: pointer; font-size: 12px; }
    .btn-dec { background: rgba(255,255,255,0.1); border: none; color: white; padding: 6px; border-radius: 4px; flex: 1; cursor: pointer; font-size: 12px; }

    .join-link-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(160, 196, 216, 0.2);
    color: #a0c4d8;
    text-decoration: none;
    padding: 10px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid rgba(160, 196, 216, 0.3);
    transition: 0.3s;
}

.join-link-btn:hover {
    background: #a0c4d8;
    color: #1a1a1a;
}

/* Add a small camera icon via CSS or use an emoji in the text */
.join-link-btn::before {
    content: '🎥';
    margin-right: 8px;
}
  </style>
</head>
<body>
  <div class="wrap">
    <!-- Existing Sidebar remains here... -->
    <div class="sidebar">
        <div class="logo" onclick="window.location.href='dashboard.html'">Tandem</div>
        <img src="/icons/home.png" alt="home" class="nav-icon">
        <div class="nav-item" onclick="window.location.href='dashboard.html'">HOME</div>
        <img src="/icons/calendar.png" alt="calendar" class="nav-icon">
        <div class="nav-item active">CALENDAR</div>
    </div>

    <div class="main">
      <div class="welcome-section">
        <div class="section-title">Schedule Planner</div>
        <div class="section-sub">Manage your sessions and respond to mentor invitations.</div>
      </div>

      <div class="calendar-layout">
        <div class="calendar-card">
          <div class="cal-nav">
            <button class="nav-btn" onclick="moveMonth(-1)">Prev</button>
            <div class="month-title" id="monthLabel">May 2026</div>
            <button class="nav-btn" onclick="moveMonth(1)">Next</button>
          </div>
          <div class="calendar-grid" id="calendarGrid">
            <!-- JS will populate weekdays and day cells here -->
          </div>
        </div>

        <div class="details-panel">
          <h3 style="font-family:'Baloo 2'; color:#a0c4d8; margin-bottom:15px;">Pending Invitations</h3>
          <div id="sidebarContent">
            <!-- JS will inject invitation cards here -->
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="dashboard.js"></script>
</body>
</html>
