<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Up Your Profile</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="profile-body-ui">

<header>
    <div class="logo">Tandem</div>
</header>

<div class="profile-wrapper-ui">

    <div class="profile-card-ui">

        <h1 class="profile-title-ui">Complete Your Profile</h1>

        <div class="profile-inner-box-ui">

            <div class="profile-pic-wrap-ui">
                <input type="file" id="profilePic" class="profile-pic-input-ui">
                <div class="profile-pic-circle-ui" id="profilePicCircle">Upload</div>
            </div>

            <div class="profile-name-display-ui" id="displayNameText">
                Loading name...
            </div>

            <form id="profileForm" class="profile-form-ui">

                <input type="text" id="usernameInput" placeholder="Enter a username" required> 

                <label class="profile-label-ui">Grade Level</label>
                <div class="grade-select-wrapper">
                    <select id="gradeLevelSelect" class="grade-select" required>
                        <option value="">Select your grade level</option>
                        <option value="elementary">🎒 Elementary (Grades 1–6)</option>
                        <option value="junior_high">📚 Junior High (Grades 7–10)</option>
                        <option value="senior_high">🎓 Senior High (Grades 11–12)</option>
                        <option value="college">🏛️ College (Undergraduate)</option>
                        <option value="postgrad">🔬 Post-Grad (Masters / PhD)</option>
                        <option value="professional">💼 Professional (Working Adult)</option>
                    </select>
                </div>

                <label class="profile-label-ui">My Skills</label>
                <div class="custom-select-wrapper">
                    <div class="custom-select-trigger" id="skillsTrigger">
                        <span>Select Skills...</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="custom-options" id="skillsOptions">
                        <div class="search-box">
                            <input type="text" id="skillsSearch" placeholder="Search skills...">
                        </div>
                        <div class="options-list" id="skillsList"></div>
                    </div>
                    <div id="skillTags" class="selected-tags-container"></div>
                </div>

                <label class="profile-label-ui">My Learning Areas</label>
                <div class="custom-select-wrapper">
                    <div class="custom-select-trigger" id="growthTrigger">
                        <span>Select Learning Areas...</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="custom-options" id="growthOptions">
                        <div class="search-box">
                            <input type="text" id="growthSearch" placeholder="Search learning areas...">
                        </div>
                        <div class="options-list" id="growthList"></div>
                    </div>
                    <div id="growthTags" class="selected-tags-container"></div>
                </div>

                <button type="submit" class="profile-action-btn-ui">
                    Complete Profile & Continue
                </button>

            </form>

        </div>
    </div>
</div>

<script src="complete-profile.js"></script>
</body>
</html>
