<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Up Your Profile</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body class="profile-body-ui">

<header>
    <div class="logo">Tandem</div>
</header>

<div class="profile-wrapper-ui">

    <!-- OUTER BOX -->
    <div class="profile-card-ui">

        <h1 class="profile-title-ui">Set Up Your Profile</h1>

        <!-- INNER BOX -->
        <div class="profile-inner-box-ui">

            <!-- PROFILE PIC -->
            <div class="profile-pic-wrap-ui">
                <input type="file" id="profilePic" class="profile-pic-input-ui">
                <div class="profile-pic-circle-ui" id="profilePicCircle">Upload</div>
            </div>

            <!-- DISPLAY NAME FROM DB -->
            <div class="profile-name-display-ui" id="displayNameText">
                Loading name...
            </div>

            <!-- FORM -->
            <form id="profileForm" class="profile-form-ui">

                <!-- USERNAME -->
                <input type="text" id="usernameInput" placeholder="Choose a username" required>

                <!-- SKILLS -->
                <label class="profile-label-ui">Skills</label>
                <div class="profile-tag-input-box-ui">
                    <input type="text" id="skillInput" placeholder="Press Enter to add">
                    <div id="skillTags" class="profile-tags-ui"></div>
                </div>

                <!-- GROWTH -->
                <label class="profile-label-ui">Growth</label>
                <div class="profile-tag-input-box-ui">
                    <input type="text" id="growthInput" placeholder="Press Enter to add">
                    <div id="growthTags" class="profile-tags-ui"></div>
                </div>

                <button type="submit" class="profile-action-btn-ui">
                    Proceed to Dashboard
                </button>

            </form>

        </div>
    </div>
</div>


<script src="complete-profile.js"></script>
</body>
</html>
