<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tandem</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">Tandem</div>
</header>

<div class="main">
    <div class="illustration">
        <img src="https://cdn-icons-gif.flaticon.com/17490/17490049.gif" alt="Illustration">
    </div>

    <div class="content">
        <h1>Learn together, grow forever — every day is a chance to earn.</h1>
        <div class="btn btn-primary" id="getStartedBtn">GET STARTED</div>
        <div class="btn btn-secondary" id="loginBtn">I ALREADY HAVE AN ACCOUNT</div>
    </div>
</div>

<!-- LOGIN / REGISTER MODAL -->
<div id="authModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>

        <form id="loginForm" class="auth-form">
            <h2>Login</h2>
            <input type="email" id="loginEmail" placeholder="Email" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>

        <form id="registerForm" class="auth-form">
            <h2>Register</h2>
            <input type="text" id="registerName" placeholder="Full Name" required>
            <input type="email" id="registerEmail" placeholder="Email" required>
            <input type="password" id="registerPassword" placeholder="Password" required>
            <button type="submit" class="btn btn-primary">Register</button>
        </form>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
