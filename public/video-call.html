<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tandem — Video Call</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Baloo 2',sans-serif;background:#0d1117;color:#fff;height:100dvh;overflow:hidden;display:flex;flex-direction:column;}

    /* ── Header ── */
    .vc-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#161b22;border-bottom:1px solid #30363d;flex-shrink:0;gap:8px;flex-wrap:wrap;}
    .vc-logo{color:#29b6d8;font-size:18px;font-weight:700;}
    .vc-subject{background:#1f2937;border:1px solid #374151;border-radius:20px;padding:3px 12px;font-size:12px;color:#9ca3af;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .vc-center{text-align:center;min-width:100px;}
    .vc-timer{font-size:24px;font-weight:700;color:#f5a623;font-variant-numeric:tabular-nums;}
    .vc-timer.warning{color:#ef4444;animation:blink 1s infinite;}
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}
    .vc-status-txt{font-size:11px;color:#6b7280;margin-top:1px;}
    .vc-role{font-size:11px;background:#1f2937;border-radius:20px;padding:2px 10px;color:#9ca3af;white-space:nowrap;}

    /* ── Videos ── */
    .vc-videos{flex:1;position:relative;background:#0d1117;overflow:hidden;}
    #remoteVideo{width:100%;height:100%;object-fit:cover;background:#111827;display:none;}
    .vc-waiting{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:#0d1117;}
    .vc-waiting-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#1e3a5f,#29b6d8);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 6px rgba(41,182,216,.2);}50%{box-shadow:0 0 0 14px rgba(41,182,216,.05);}}
    #localVideo{position:absolute;bottom:80px;right:12px;width:130px;height:100px;border-radius:10px;object-fit:cover;background:#1f2937;border:2px solid #374151;z-index:20;cursor:move;}
    .remote-name{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);border-radius:20px;padding:4px 12px;font-size:12px;color:#e5e7eb;z-index:5;display:none;}

    /* ── Controls ── */
    .vc-controls{display:flex;align-items:center;justify-content:center;gap:12px;padding:10px 16px;background:#161b22;border-top:1px solid #30363d;flex-shrink:0;}
    .ctrl-item{display:flex;flex-direction:column;align-items:center;gap:2px;}
    .ctrl-btn{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:transform .15s;}
    .ctrl-btn:hover{transform:scale(1.1);}
    .btn-mic{background:#1f2937;} .btn-cam{background:#1f2937;}
    .btn-end{background:#dc2626;width:52px;height:52px;font-size:20px;}
    .btn-muted{background:#374151;opacity:.7;} .btn-cam-off{background:#374151;opacity:.7;}
    .ctrl-label{font-size:9px;color:#6b7280;}

    /* ── Overlays ── */
    #connectingOverlay{position:fixed;inset:0;background:rgba(13,17,23,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:100;}
    .spinner-ring{width:46px;height:46px;border:4px solid #1f2937;border-top-color:#29b6d8;border-radius:50%;animation:spin .9s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* ── Modal (warning / rejoin / extend) ── */
    .vc-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:200;padding:16px;}
    .vc-modal{background:#1f2937;border:1px solid #374151;border-radius:16px;padding:24px 20px;width:100%;max-width:320px;text-align:center;}
    .vc-modal h3{font-size:17px;color:#e5e7eb;margin-bottom:8px;}
    .vc-modal p{font-size:13px;color:#9ca3af;margin-bottom:18px;line-height:1.5;}
    .vc-modal-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
    .vc-modal-btn{padding:9px 16px;border-radius:10px;border:none;font-family:'Baloo 2',sans-serif;font-size:13px;font-weight:700;cursor:pointer;flex:1;min-width:100px;}
    .btn-extend{background:#f5a623;color:#0d1117;}
    .btn-leave{background:#374151;color:#e5e7eb;}
    .btn-stay{background:#29b6d8;color:#fff;}
    .btn-rejoin{background:#4caf7d;color:#fff;}
    .btn-end-sess{background:#dc2626;color:#fff;}

    /* ── Toast ── */
    #vcToast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:#1f2937;color:#e5e7eb;padding:9px 18px;border-radius:20px;font-size:12px;z-index:300;opacity:0;transition:opacity .3s;white-space:nowrap;}
    #vcToast.show{opacity:1;}

    /* Mobile tweaks */
    @media(max-width:480px){
      #localVideo{width:90px;height:70px;bottom:70px;}
      .vc-subject{display:none;}
    }
  </style>
</head>
<body>

<div id="connectingOverlay">
  <div class="spinner-ring"></div>
  <p style="color:#9ca3af;font-size:13px;">Connecting…</p>
</div>

<div class="vc-header">
  <div class="vc-logo">Tandem</div>
  <div class="vc-subject" id="vcSubject">Loading…</div>
  <div class="vc-center">
    <div class="vc-timer" id="vcTimer">--:--</div>
    <div class="vc-status-txt" id="vcStatus">Waiting for peer to join…</div>
  </div>
  <div class="vc-role" id="vcRole"></div>
</div>

<div class="vc-videos">
  <div class="vc-waiting" id="waitingScreen">
    <div class="vc-waiting-avatar" id="waitAvatar">?</div>
    <p style="color:#e5e7eb;font-weight:700;font-size:15px;" id="waitName">Connecting…</p>
    <p style="color:#9ca3af;font-size:12px;" id="waitHint"></p>
  </div>
  <video id="remoteVideo" autoplay playsinline></video>
  <div class="remote-name" id="remoteName"></div>
  <video id="localVideo" autoplay playsinline muted></video>
</div>

<div class="vc-controls">
  <div class="ctrl-item">
    <button class="ctrl-btn btn-mic" id="btnMic">🎙️</button>
    <span class="ctrl-label" id="lblMic">Mic</span>
  </div>
  <div class="ctrl-item">
    <button class="ctrl-btn btn-cam" id="btnCam">📷</button>
    <span class="ctrl-label" id="lblCam">Camera</span>
  </div>
  <div class="ctrl-item">
    <button class="ctrl-btn btn-end" id="btnEnd">📵</button>
    <span class="ctrl-label">End</span>
  </div>
</div>

<!-- Warning / Extension / Rejoin modal -->
<div class="vc-modal-overlay" id="vcModal">
  <div class="vc-modal">
    <h3 id="vcModalTitle">⚠️ Time Warning</h3>
    <p id="vcModalBody">Your session is almost over.</p>
    <div class="vc-modal-actions" id="vcModalActions"></div>
  </div>
</div>

<!-- Learner left — freeze + rejoin popup -->
<div class="vc-modal-overlay" id="rejoinModal">
  <div class="vc-modal">
    <h3>📵 You left the call</h3>
    <p>Your session is still active. Rejoin to continue, or end the session now.</p>
    <div class="vc-modal-actions">
      <button class="vc-modal-btn btn-rejoin" onclick="rejoinCall()">📹 Rejoin Session</button>
      <button class="vc-modal-btn btn-end-sess" onclick="endCallFromRejoin()">✋ End Session</button>
    </div>
  </div>
</div>

<div id="vcToast"></div>
<script src="/socket.io/socket.io.js"></script>
<script>
// ── URL params ────────────────────────────────────────────────
const p         = new URLSearchParams(location.search);
const myEmail   = p.get('email')   || localStorage.getItem('userEmail') || '';
const peerEmail = p.get('peer')    || '';
const sessionId = p.get('session') || '';
const subject   = p.get('subject') || 'Session';
const myName    = p.get('name')    || localStorage.getItem('tandem_username') || myEmail;
const myRole    = p.get('role')    || 'learner'; // 'tutor' or 'learner'
const isTutor   = myRole === 'tutor';
const API       = 'http://localhost:3000';

const roomId = [myEmail, peerEmail].sort().join('__');

document.getElementById('vcSubject').textContent = subject;
document.getElementById('waitName').textContent  = peerEmail || 'your peer';
document.getElementById('vcRole').textContent    = isTutor ? '🎓 Mentor' : '🎒 Learner';
document.getElementById('waitHint').textContent  = isTutor
    ? 'Timer starts when the learner joins the call.'
    : 'Timer starts when you join the call.';

// ── State ─────────────────────────────────────────────────────
let localStream    = null;
let peerConn       = null;
let peerSocketId   = null;
let micOn = true, camOn = true;
let elapsedSec     = 0;        // only counting while BOTH are connected
let timerInterval  = null;
let timerRunning   = false;
let peerPresent    = false;     // is the remote peer in the room?
let leftEarly      = false;     // learner voluntarily left
let warned10 = false, warned5 = false;
const BASE_SEC     = 30 * 60;  // 30 minutes per credit
let totalAllowed   = BASE_SEC;
let extensionCount = 0;
let mediaStarted   = false;

// ── Credit calc: proper fine-grained ratio ────────────────────
// 0–1 min  → 0.05 credits to tutor
// 1–5 min  → 0.1
// 5–10 min → 0.25
// 10–20 min → 0.5
// 20–30 min → 1.0 (full)
function calcCreditAward(sec) {
    if (sec <= 0) return 0;
    if (sec < 60)      return 0.05;
    if (sec < 300)     return 0.1;
    if (sec < 600)     return 0.25;
    if (sec < 1200)    return 0.5;
    return 1;
}

// ── ICE / WebRTC ──────────────────────────────────────────────
const ICE = { iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}] };
const socket = io();

// ── Media ─────────────────────────────────────────────────────
async function startMedia() {
    if (mediaStarted) return;
    mediaStarted = true;
    try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    } catch(e) {
        toast('⚠️ Camera/mic unavailable — continuing without video.');
        localStream = new MediaStream();
    }
    document.getElementById('localVideo').srcObject = localStream;
}

function createPC() {
    const pc = new RTCPeerConnection(ICE);
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
    pc.onicecandidate = ({ candidate }) => { if (candidate && peerSocketId) socket.emit('ice-candidate', { to: peerSocketId, candidate }); };
    pc.ontrack = ({ streams }) => {
        const rv = document.getElementById('remoteVideo');
        rv.srcObject = streams[0]; rv.style.display = 'block';
        document.getElementById('waitingScreen').style.display = 'none';
        document.getElementById('remoteName').textContent = peerEmail;
        document.getElementById('remoteName').style.display = 'block';
        peerPresent = true;
        // Timer starts NOW (when learner first appears on tutor's side / when learner actually joined)
        if (!timerRunning) startTimer();
        document.getElementById('vcStatus').textContent = 'Connected · Timer running';
    };
    pc.onconnectionstatechange = () => {
        if (['disconnected','failed'].includes(pc.connectionState)) {
            document.getElementById('vcStatus').textContent = 'Peer connection lost';
        }
    };
    return pc;
}

async function makeOffer() {
    peerConn = createPC();
    const offer = await peerConn.createOffer();
    await peerConn.setLocalDescription(offer);
    socket.emit('offer', { to: peerSocketId, offer });
}

// ── Socket events ─────────────────────────────────────────────
socket.on('connect', async () => {
    await startMedia();
    socket.emit('join-video-room', { roomId, email: myEmail });
    socket.emit('register-user', { email: myEmail });
});

socket.on('room-users', users => {
    if (users.length) { peerSocketId = users[0].socketId; makeOffer(); }
    document.getElementById('connectingOverlay').style.display = 'none';
});

socket.on('user-joined', ({ socketId, email }) => {
    peerSocketId = socketId;
    peerPresent  = true;
    document.getElementById('connectingOverlay').style.display = 'none';
    document.getElementById('vcStatus').textContent = `${email} joined`;
});

socket.on('offer', async ({ from, offer }) => {
    peerSocketId = from; peerConn = createPC();
    await peerConn.setRemoteDescription(new RTCSessionDescription(offer));
    const ans = await peerConn.createAnswer();
    await peerConn.setLocalDescription(ans);
    socket.emit('answer', { to: from, answer: ans });
});

socket.on('answer', async ({ from, answer }) => {
    if (peerConn) await peerConn.setRemoteDescription(new RTCSessionDescription(answer));
});

socket.on('ice-candidate', async ({ from, candidate }) => {
    if (peerConn && candidate) try { await peerConn.addIceCandidate(new RTCIceCandidate(candidate)); } catch(e) {}
});

socket.on('call-ended', () => {
    toast('📵 Mentor ended the call.');
    setTimeout(() => finalizeAndReturn(), 2000);
});

socket.on('user-left', () => {
    peerPresent = false;
    document.getElementById('vcStatus').textContent = 'Peer left the call';
});

// ── Timer ─────────────────────────────────────────────────────
function startTimer() {
    if (timerRunning) return;
    timerRunning = true;
    warned10 = false; warned5 = false;
    timerInterval = setInterval(() => {
        elapsedSec++;
        const remaining = totalAllowed - elapsedSec;
        const absRem    = Math.abs(remaining);
        const m = String(Math.floor(absRem / 60)).padStart(2, '0');
        const s = String(absRem % 60).padStart(2, '0');
        const el = document.getElementById('vcTimer');
        el.textContent = `${remaining < 0 ? '-' : ''}${m}:${s}`;

        // Warnings
        if (!warned10 && remaining <= 600 && remaining > 0) {
            warned10 = true;
            el.classList.add('warning');
            const canExt = !isTutor && elapsedSec >= 3600;
            showVcModal('⏰ 10 Minutes Left',
                `Your session ends in 10 minutes.${canExt ? ' You can extend for 1 more credit.' : ''}`,
                [{ label: 'Got it', cls: 'btn-stay', fn: closeVcModal }]);
        }
        if (!warned5 && remaining <= 300 && remaining > 0) {
            warned5 = true;
            showTimesUpSoon();
        }
        if (remaining <= 0) {
            clearInterval(timerInterval);
            timerRunning = false;
            el.textContent = '00:00';
            showTimesUp();
        }
    }, 1000);
}

function pauseTimer() { if (timerRunning) { clearInterval(timerInterval); timerRunning = false; } }
function resumeTimer() { if (!timerRunning && elapsedSec < totalAllowed) startTimer(); }

function showTimesUpSoon() {
    const canExt = !isTutor && elapsedSec >= 3600;
    showVcModal('⚠️ 5 Minutes Left',
        canExt ? 'Session ends in 5 minutes. Extend for 1 credit?' : 'Session ends in 5 minutes.',
        [{ label: 'OK', cls: 'btn-stay', fn: closeVcModal }]);
}

function showTimesUp() {
    if (!isTutor && elapsedSec >= 3600) {
        showVcModal('🏁 Time\'s Up!',
            'Your 30-minute session ended. Extend for 1 more credit (30 min), or complete the session.',
            [
                { label: '➕ Extend (+1 credit)', cls: 'btn-extend', fn: () => { closeVcModal(); extendSession(); } },
                { label: 'End Session', cls: 'btn-leave', fn: () => { closeVcModal(); finalizeAndReturn(); } }
            ]);
    } else {
        showVcModal('🏁 Time\'s Up!', 'The session time has ended.',
            [{ label: 'Complete Session', cls: 'btn-leave', fn: () => { closeVcModal(); finalizeAndReturn(); } }]);
    }
}

// ── Controls ──────────────────────────────────────────────────
document.getElementById('btnMic').onclick = () => {
    micOn = !micOn;
    localStream.getAudioTracks().forEach(t => t.enabled = micOn);
    document.getElementById('btnMic').textContent = micOn ? '🎙️' : '🔇';
    document.getElementById('btnMic').className   = `ctrl-btn ${micOn ? 'btn-mic' : 'btn-muted'}`;
    document.getElementById('lblMic').textContent = micOn ? 'Mic' : 'Muted';
};
document.getElementById('btnCam').onclick = () => {
    camOn = !camOn;
    localStream.getVideoTracks().forEach(t => t.enabled = camOn);
    document.getElementById('btnCam').textContent = camOn ? '📷' : '🚫';
    document.getElementById('btnCam').className   = `ctrl-btn ${camOn ? 'btn-cam' : 'btn-cam-off'}`;
    document.getElementById('lblCam').textContent = camOn ? 'Camera' : 'Off';
};

// When learner clicks "End Call" — if timer hasn't run out, ask rejoin/end
document.getElementById('btnEnd').onclick = () => {
    if (!isTutor && timerRunning && elapsedSec < totalAllowed) {
        // Learner left early — pause timer, show rejoin popup
        pauseTimer();
        leftEarly = true;
        // Disconnect from the room temporarily (peer sees "left")
        socket.emit('end-call', { roomId });
        if (peerConn) { peerConn.close(); peerConn = null; }
        document.getElementById('rejoinModal').style.display = 'flex';
    } else {
        if (confirm('End the session?')) finalizeAndReturn();
    }
};

// Tutor ending always finalizes immediately
// For tutor, "End Session" button on mentor side finalizes everything.

// ── Rejoin ────────────────────────────────────────────────────
async function rejoinCall() {
    document.getElementById('rejoinModal').style.display = 'none';
    leftEarly = false;
    // Re-connect to socket room
    await startMedia();
    socket.emit('join-video-room', { roomId, email: myEmail });
    resumeTimer();
    toast('Rejoining session…');
}

function endCallFromRejoin() {
    document.getElementById('rejoinModal').style.display = 'none';
    finalizeAndReturn();
}

// ── Extension ─────────────────────────────────────────────────
async function extendSession() {
    try {
        const r = await fetch(`${API}/extend-session`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sessionId, learnerEmail: myEmail })
        });
        const data = await r.json();
        if (data.success) {
            extensionCount++;
            totalAllowed += BASE_SEC;
            warned5 = false; warned10 = false;
            document.getElementById('vcTimer').classList.remove('warning');
            if (!timerRunning) startTimer();
            toast('✅ Extended 30 minutes!');
        } else {
            toast(data.message || 'Could not extend.');
        }
    } catch(e) { toast('Error extending session.'); }
}

// ── Finalize session ──────────────────────────────────────────
async function finalizeAndReturn() {
    clearInterval(timerInterval);
    timerRunning = false;
    socket.emit('end-call', { roomId });
    if (peerConn) { peerConn.close(); peerConn = null; }
    if (localStream) localStream.getTracks().forEach(t => t.stop());

    // Complete session on server (tutor side sends the elapsed seconds)
    if (sessionId && isTutor) {
        try {
            await fetch(`${API}/complete-session`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sessionId, rating: null, feedback: null, elapsedSeconds: elapsedSec, feedbackTags: [] })
            });
        } catch(e) {}
    }

    // Learner gets rating modal via messages page
    // Store elapsed for rating modal to use
    sessionStorage.setItem('lastSessionElapsed', String(elapsedSec));
    sessionStorage.setItem('lastSessionId', sessionId);
    sessionStorage.setItem('openChatWith', peerEmail);

    // If learner, open rating in messages
    if (!isTutor) {
        sessionStorage.setItem('showRatingOnLoad', '1');
    }

    window.location.href = 'messages.html';
}

// ── Modal helpers ─────────────────────────────────────────────
function showVcModal(title, body, actions) {
    document.getElementById('vcModalTitle').textContent = title;
    document.getElementById('vcModalBody').textContent  = body;
    const actEl = document.getElementById('vcModalActions');
    actEl.innerHTML = actions.map((a, i) => `<button class="vc-modal-btn ${a.cls}" id="vmb${i}">${a.label}</button>`).join('');
    actions.forEach((a, i) => { document.getElementById(`vmb${i}`).onclick = a.fn; });
    document.getElementById('vcModal').style.display = 'flex';
}
function closeVcModal() { document.getElementById('vcModal').style.display = 'none'; }

// ── Draggable local PiP ───────────────────────────────────────
(()=>{
    const el = document.getElementById('localVideo');
    let drag = false, ox = 0, oy = 0;
    el.addEventListener('mousedown', e => { drag=true; ox=e.clientX-el.offsetLeft; oy=e.clientY-el.offsetTop; });
    document.addEventListener('mousemove', e => { if(!drag)return; el.style.right='auto'; el.style.bottom='auto'; el.style.left=(e.clientX-ox)+'px'; el.style.top=(e.clientY-oy)+'px'; });
    document.addEventListener('mouseup', () => drag=false);
})();

// ── Toast ─────────────────────────────────────────────────────
function toast(msg) {
    const el = document.getElementById('vcToast');
    el.textContent = msg; el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3500);
}

// Check if returning from rejoin and should show rating
document.addEventListener('DOMContentLoaded', () => {
    const showRating = sessionStorage.getItem('showRatingOnLoad');
    if (showRating === '1') {
        sessionStorage.removeItem('showRatingOnLoad');
        const elapsed = parseInt(sessionStorage.getItem('lastSessionElapsed') || '0');
        const sid     = sessionStorage.getItem('lastSessionId') || '';
        if (typeof window.triggerRatingModal === 'function') {
            window.triggerRatingModal(sid, '', '', elapsed);
        }
    }
});

// 45s no connection hint
setTimeout(() => { if (!peerPresent) toast('💡 Make sure both users have this page open.'); }, 45000);
</script>
<script src="/socket.io/socket.io.js"></script>
<script src="credit-sync.js"></script>
<script src="rating-modal.js"></script>
</body>
</html>
